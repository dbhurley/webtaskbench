name: Weekly Benchmark

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 6am UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout webtaskbench
        uses: actions/checkout@v4

      - name: Checkout plasmate-benchmarks
        uses: actions/checkout@v4
        with:
          repository: plasmate-labs/plasmate-benchmarks
          path: benchmarks

      - name: Install Plasmate
        run: |
          curl -fsSL https://github.com/plasmate-labs/plasmate/releases/latest/download/plasmate-x86_64-linux -o /usr/local/bin/plasmate
          chmod +x /usr/local/bin/plasmate

      - name: Get Plasmate version
        id: version
        run: |
          # Binary reports 0.1.0 due to build bug; get version from release tag
          VER=$(curl -s https://api.github.com/repos/plasmate-labs/plasmate/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          echo "plasmate_version=$VER" >> "$GITHUB_OUTPUT"

      - name: Patch benchmark for CI timeouts
        working-directory: benchmarks
        run: |
          # Wrap plasmate fetch with a 45s kill timeout so no single URL hangs the job
          sed -i 's|SOM=$(plasmate fetch "$url"|SOM=$(timeout 45s plasmate fetch "$url" --timeout 30000|g' run-benchmark.sh
          # Install tiktoken upfront so it doesn't stall mid-run
          pip install tiktoken --quiet

      - name: Run benchmark
        working-directory: benchmarks
        run: ./run-benchmark.sh
        timeout-minutes: 30

      - name: Find latest results file
        id: results
        run: |
          LATEST=$(ls -t benchmarks/results/benchmark-*.json 2>/dev/null | head -1)
          if [ -z "$LATEST" ]; then echo "No results found"; exit 1; fi
          echo "file=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update benchmark data
        run: |
          node scripts/update-benchmark-data.js \
            "${{ steps.results.outputs.file }}" \
            "${{ steps.version.outputs.plasmate_version }}"

      - name: Commit and push
        run: |
          git config user.name "WebTaskBench Bot"
          git config user.email "webtaskbench@somspec.org"
          git add src/data/benchmark.ts
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "data: weekly benchmark update (Plasmate v${{ steps.version.outputs.plasmate_version }})"
            git push
          fi
